name: Build and Push Docker Container

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - '.github/workflows/build-and-push-container.yaml'

  workflow_dispatch:
    inputs:
      jmx_exporter_version:
        description: 'JMX Exporter Version'
        required: false
        default: '1.4.0'

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
              
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=schedule
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=jmx_exporter-${{ github.event.inputs.jmx_exporter_version }}
            type=raw,value=latest

      -   name: Build and push Docker images
          id: push
          uses: docker/build-push-action@v6
          with:
            file: ./Dockerfile
            push: true
            tags: ${{ steps.meta.outputs.tags }}
            labels: ${{ steps.meta.outputs.labels }}
            build-args: |
              JMX_EXPORTER_VERSION=${{ github.event.inputs.jmx_exporter_version }}
            platforms: linux/amd64,linux/arm/v7,linux/arm64/v8
            outputs: type=image,name=target,annotation-index.org.opencontainers.image.description=Prometheus jmx-exporter https://prometheus.github.io/jmx_exporter/${{ github.event.inputs.jmx_exporter_version }}/,annotation-index.org.opencontainers.image.version=${{ github.event.inputs.jmx_exporter_version }}
