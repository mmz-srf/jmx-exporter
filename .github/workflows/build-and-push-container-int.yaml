name: Build and Push Docker Container INT

on:
  push:
    tags:        
      - 'v*.*.*'   # Matches v1.2.3, v0.1.0, etc.
  workflow_dispatch:
    inputs:
      jmx_exporter_version:
        description: 'JMX Exporter Version'
        required: false
        default: '1.4.0'

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
              
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=schedule
            type=ref,event=branch
            type=sha
            type=raw,value=jmx_exporter-${{ github.event.inputs.jmx_exporter_version || '1.4.0' }}
            type=raw,value=int-${{ github.repository.tag_name }}

      -   name: Build and push Docker images
          id: push
          uses: docker/build-push-action@v6
          with:
            file: ./Dockerfile
            push: true
            tags: ${{ steps.meta.outputs.tags }}
            labels: ${{ steps.meta.outputs.labels }}
            build-args: |
              JMX_EXPORTER_VERSION=${{ github.event.inputs.jmx_exporter_version || '1.4.0' }}
            platforms: linux/amd64,linux/arm/v7,linux/arm64/v8
            outputs: type=image,name=target,annotation-index.org.opencontainers.image.description=Prometheus jmx-exporter https://prometheus.github.io/jmx_exporter/${{ github.event.inputs.jmx_exporter_version || '1.4.0' }}/,annotation-index.org.opencontainers.image.version=${{ github.event.inputs.jmx_exporter_version || '1.4.0' }}
